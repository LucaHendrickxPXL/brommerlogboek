name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  app-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-bookworm
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brommer_logboek
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d brommer_logboek"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 8

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/brommer_logboek

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npm run db:migrate

      - name: Typecheck
        run: npm run typecheck

      - name: Build app
        run: npm run build
