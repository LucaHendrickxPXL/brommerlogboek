services:
  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net

  migrate:
    image: ${APP_IMAGE}
    restart: "no"
    command: ["node", "scripts/apply-schema.mjs"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      UPLOADS_DIR: /app/storage/uploads
    volumes:
      - type: bind
        source: ${UPLOADS_DIR}
        target: /app/storage/uploads
    networks:
      - app_net

  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      UPLOADS_DIR: /app/storage/uploads
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - type: bind
        source: ${UPLOADS_DIR}
        target: /app/storage/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then((response)=>{if(!response.ok)process.exit(1);}).catch(()=>process.exit(1));\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - app_net

volumes:
  postgres_data:

networks:
  app_net:
    driver: bridge
